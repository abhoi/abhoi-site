<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Amlaan Bhoi">
  <defs>
    <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="64">
      <stop offset="0" stop-color="#2f97ff"/>
      <stop offset="1" stop-color="#0071e3"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Agent trajectory: a route through waypoints, a faint checked-and-abandoned
       branch, and one solid decisive end node. Figure = white; hollow waypoint
       centers carry the tile gradient so they read as rings that blend with the tile. -->
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 46 L31 33 L50 18" stroke-width="3"/>
    <path d="M31 33 L43 41" stroke-width="2" opacity=".5" stroke-dasharray="1 4.5"/>
  </g>
  <circle cx="15" cy="46" r="4"   fill="url(#g)" stroke="#fff" stroke-width="2.4"/>
  <circle cx="31" cy="33" r="4"   fill="url(#g)" stroke="#fff" stroke-width="2.4"/>
  <circle cx="43" cy="41" r="3"   fill="url(#g)" stroke="#fff" stroke-width="2" opacity=".55"/>
  <circle cx="50" cy="18" r="5.5" fill="#fff"/>
</svg>
